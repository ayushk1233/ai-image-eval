version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: josh-ai-eval-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./generated_images:/app/generated_images
    restart: unless-stopped
    
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: josh-ai-eval-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./generated_images:/app/generated_images
      - ./reports:/app/reports
      - ./docs:/app/docs
    restart: unless-stopped
